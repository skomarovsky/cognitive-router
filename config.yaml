version: 1
embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  normalize: true
  batch_size: 64
generator:
  backend: vllm-openai
  model_id: Qwen/Qwen2.5-7B-Instruct
  dtype: auto
  device_map: auto
  max_new_tokens: 512
  temperature: 0.35
  top_p: 0.9
  top_k: 40
  repetition_penalty: 1.05
  openai_base_url: http://localhost:8000/v1
  openai_api_key: sk-local-please-change
  openai_model: qwen2.5-7b-instruct
router:
  top_k: 3
  temperature: 0.35
  weights: {sim: 1.0, kw: 0.15, prior: 0.05, cost: 0.2, lat: 0.1, health: 0.2}
